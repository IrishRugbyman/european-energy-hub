# nginx-energy-bootstrap.conf - HTTP only, used to issue the TLS cert.
#
# Steps:
#   sudo ln -s ~/quant/energy/nginx-energy-bootstrap.conf /etc/nginx/sites-enabled/energy
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d energy.lbzgiu.xyz
# After certbot certbot will rewrite this file to add SSL.
# Then replace the symlink with the production config:
#   sudo ln -sf ~/quant/energy/nginx-energy.conf /etc/nginx/sites-enabled/energy
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name energy.lbzgiu.xyz;

    root /home/lbzgiu/quant/energy/frontend/dist;
    index index.html;

    location /geo/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/energy.lbzgiu.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/energy.lbzgiu.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = energy.lbzgiu.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name energy.lbzgiu.xyz;
    return 404; # managed by Certbot


}