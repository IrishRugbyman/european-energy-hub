name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"
            cd ~/quant/energy
            git pull origin master

            echo "=== Backend ==="
            cd backend
            uv sync
            sudo systemctl restart energy-api

            echo "=== Frontend ==="
            cd ../frontend
            npm ci --silent
            npm run build

            echo "=== Done ==="
            sudo systemctl is-active energy-api
