# nginx-energy.conf - European Energy Hub
#
# Symlink into sites-enabled:
#   sudo ln -s ~/quant/energy/nginx-energy.conf /etc/nginx/sites-enabled/energy
#
# Issue TLS cert (before enabling Cloudflare orange-cloud):
#   sudo certbot --nginx -d energy.lbzgiu.xyz
#
# After certbot, Cloudflare A record: energy.lbzgiu.xyz -> 178.104.244.177 (orange-cloud ok)

server {
    listen 80;
    server_name energy.lbzgiu.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name energy.lbzgiu.xyz;

    ssl_certificate     /etc/letsencrypt/live/energy.lbzgiu.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/energy.lbzgiu.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/lbzgiu/quant/energy/frontend/dist;
    index index.html;

    # Vite hashed JS/CSS: filenames contain content hash, safe to cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # GeoJSON assets: long cache, they only change when we re-vendor
    location /geo/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy -> FastAPI :8004
    location /api/ {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
